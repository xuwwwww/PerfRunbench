model:
  name: mobilenetv3
  input_shape: [1, 3, 224, 224]
  parameter_count: 5483032

hardware:
  target: cpu

search_space:
  backends: [pytorch, onnxruntime]
  batch_sizes: [1, 2, 4, 8, 16]
  thread_counts: [1, 2, 4, 8]
  precisions: [fp32, int8]
  graph_optimizations: [disable, basic, extended, all]

objective:
  name: latency
  latency_budget_ms: 20
  memory_budget_mb: 1024

resource_budget:
  memory_budget_gb: 22
  reserve_memory_gb: 1.7
  reserve_cores: 1
  cpu_quota_percent: 90
  enforce: true

profiler:
  warmup: 5
  repeat: 20
  output: results/raw/mobilenetv3_profile.json
  csv_output: results/raw/mobilenetv3_profile.csv
  onnx_dir: artifacts/onnx
