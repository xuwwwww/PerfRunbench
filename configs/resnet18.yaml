model:
  name: resnet18
  input_shape: [1, 3, 224, 224]
  parameter_count: 11689512

hardware:
  target: cpu

search_space:
  backends: [pytorch, onnxruntime]
  batch_sizes: [1, 2, 4, 8, 16]
  thread_counts: [1, 2, 4, 8]
  precisions: [fp32, int8]
  graph_optimizations: [disable, basic, extended, all]

objective:
  name: latency
  latency_budget_ms: 30
  memory_budget_mb: 2048

profiler:
  warmup: 5
  repeat: 20
  output: results/raw/resnet18_profile.json
  csv_output: results/raw/resnet18_profile.csv
  onnx_dir: artifacts/onnx
